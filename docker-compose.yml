services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: tritiya-api
    env_file:
      - ./app/.env
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: tritiya-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
