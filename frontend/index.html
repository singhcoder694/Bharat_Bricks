<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeSpace</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface-hover: #22222e;
      --border: #2a2a3a;
      --text: #e4e4ed;
      --text-muted: #8888a0;
      --accent: #7c5cfc;
      --accent-soft: #7c5cfc22;
      --user-bubble: #7c5cfc;
      --ai-bubble: #1e1e2e;
      --danger: #ff6b8a;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c5cfc, #ff6b8a, #ffb86c, #50fa7b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff6b8a;
      transition: background 0.3s;
    }

    .status-dot.connected { background: #50fa7b; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, #7c5cfc, #ff6b8a);
    }

    .message.user .avatar {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .welcome {
      text-align: center;
      padding: 60px 24px 30px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 18px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      padding: 8px 0;
      line-height: 1.5;
    }

    .input-row textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 24px 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">S</div>
      <div>
        <h1>SafeSpace</h1>
        <p>Your LGBTQ+ companion</p>
      </div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Welcome to SafeSpace</h2>
        <p>A safe, private space to talk about your identity, feelings, and experiences. No messages are stored. Everything stays between us.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          placeholder="Type your message..."
          rows="1"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
    <div class="disclaimer">Your conversations are never stored. Privacy is our foundation.</div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let ws = null;
    let sessionId = null;
    let typingEl = null;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

      ws.onopen = () => {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
        sendBtn.disabled = false;
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        ws.close();
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'session') {
          sessionId = data.session_id;
          return;
        }

        if (data.type === 'typing') {
          showTyping();
          return;
        }

        if (data.type === 'response') {
          removeTyping();
          addMessage('ai', data.message);
          return;
        }

        if (data.type === 'error') {
          removeTyping();
          addMessage('ai', `Something went wrong. Please try again.`);
        }
      };
    }

    function addMessage(role, text) {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'ai' ? 'S' : 'U';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement('div');
      typingEl.className = 'message ai';
      typingEl.innerHTML = `
        <div class="avatar">S</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      `;
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      if (typingEl) {
        typingEl.remove();
        typingEl = null;
      }
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      ws.send(JSON.stringify({ message: text }));
      inputEl.value = '';
      inputEl.style.height = 'auto';
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    connect();
  </script>
</body>
</html>
